services:
  - type: web
    name: pieia-backend
    runtime: node
    region: ohio
    plan: free
    buildCommand: npm install && cd backend && npx prisma generate && npx prisma migrate deploy
    startCommand: cd backend && node src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: pieia-entregables
      - key: CORE_DATABASE_URL
        sync: false
      - key: CORE_JWT_SECRET
        sync: false
      - key: CORE_JWT_REFRESH_SECRET
        sync: false
      - key: CORE_JWT_EXPIRES_IN
        value: 24h
      - key: CORE_SMTP_HOST
        sync: false
      - key: CORE_SMTP_PORT
        sync: false
      - key: CORE_SMTP_USER
        sync: false
      - key: CORE_SMTP_PASS
        sync: false
      - key: CORE_SMTP_FROM
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
