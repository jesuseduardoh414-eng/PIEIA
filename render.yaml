# Backend de PIEIA en Render. Las variables con `sync: false` se ponen a mano en el
# dashboard de Render (Environment) y NO se versionan (secretos). Las `value:` son
# públicas y viven aquí. Render inyecta PORT automáticamente.
services:
  - type: web
    name: pieia-backend
    runtime: node
    region: ohio
    plan: free
    buildCommand: npm install && cd backend && npx prisma generate && npx prisma migrate deploy
    startCommand: cd backend && node src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info

      # --- Base de datos propia de PIEIA (proyecto ebfgkyogulbbkcqocstp) ---
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false

      # --- Identidad / core compartido (wabee) ---
      - key: CORE_DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CORE_JWT_SECRET
        sync: false
      - key: CORE_JWT_REFRESH_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 24h

      # --- Almacenamiento de entregables (Supabase Storage de PIEIA) ---
      - key: STORAGE_SUPABASE_URL
        sync: false
      - key: STORAGE_SUPABASE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: pieia-entregables

      # --- Correo (SMTP del core) ---
      - key: CORE_SMTP_HOST
        sync: false
      - key: CORE_SMTP_PORT
        sync: false
      - key: CORE_SMTP_USER
        sync: false
      - key: CORE_SMTP_PASS
        sync: false
      - key: CORE_SMTP_FROM
        sync: false

      # --- IA: Anthropic (agentes) + Voyage (embeddings RAG) ---
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: VOYAGE_API_KEY
        sync: false

      # --- Visor de planos APS (Autodesk) ---
      - key: APS_CLIENT_ID
        sync: false
      - key: APS_CLIENT_SECRET
        sync: false
      - key: APS_BUCKET_KEY
        sync: false

      # --- Observabilidad (Sentry, RNF-08). Sin DSN queda desactivado. ---
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.1"

      # --- Alertas de costo de IA (RF-H04) ---
      - key: ALERTA_COSTO_MENSUAL_USD
        value: "8"
      - key: ALERTA_COSTO_PROYECTO_USD
        value: "4"

      # --- Enlace con el frontend (se llenan tras desplegar en Vercel) ---
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
